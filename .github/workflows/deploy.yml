# helix-deploy.example.yml — TEMPLATE SANITIZZATO del workflow di build+deploy delle TRE
# frontend Helix su jarvis (MIG-02). Il file VERO vive nel repo sorgente
# `toto-castaldi/helix` come `.github/workflows/deploy.yml` — NON in questo repo — e
# RIMPIAZZA il vecchio deploy via SSH verso il droplet. Qui è committato solo il template con
# placeholder (repo pubblico vivo).
#
# > ⚠️ Placeholder-only. Identificatori reali (owner/repo GitHub, domini, valori
# >    VITE_SUPABASE_*, SHA pinnato dell'action) vivono SOLO nel repo sorgente / nei secrets
# >    del repo helix / on-host. Placeholder usati: `toto-castaldi/helix` (repo sorgente),
# >    `<pinned-sha>` (commit SHA di actions/checkout), `helix-landing-www`/`helix-coach-www`/
# >    `helix-live-www` (le tre webroot host-side su jarvis, sotto /srv/site-1-frontend).
# >    I valori VITE_SUPABASE_* sono i secrets ESISTENTI del repo helix (mai inline qui).
#
# COSA FA (e cosa NON fa):
#   FA: npm ci + i TRE build Vite (build:landing -> dist-landing/, build -> dist/,
#       build:live -> dist-live/) con env di build dai secrets, poi un deploy ATOMICO di
#       ciascun dist nella PROPRIA webroot (releases/<sha>/ + flip `mv -T` di current).
#   NON FA: il vecchio deploy via SSH verso il droplet, né alcun passo Supabase (dump/push,
#       deploy delle functions, project link) o reload nginx via SSH. Il BACKEND Helix resta INTOCCATO su
#       Supabase Cloud (fuori scope). Niente rsync --delete in-place su una webroot viva.
#
# SICUREZZA (runner self-hosted su repo PUBBLICO = vettore RCE — T-10-06):
#   - Trigger SOLO `on: push: branches: [main]`. MAI trigger basati su PR-da-fork (i due
#     eventi PR di GitHub, standard e *_target) — un push da un fork atterra sul fork, non a
#     monte → non raggiunge il runner.
#   - Job guard `if: github.repository == 'toto-castaldi/helix'` (defense-in-depth).
#   - Repo Setting "Require approval for all outside collaborators" ON (host-only, control-plane).
#   - `permissions: contents: read` (least privilege); `actions/checkout` pinnato a un commit SHA.
#   - Il runner gira come utente `nologin` dedicato, NO sudo, NON nel gruppo `docker`,
#     DISTINTO dal runner dum-e (lumio). node 20 è user-local sul PATH del runner (drop-in).

name: Deploy Helix to jarvis

on:
  push:
    branches: [main]          # SOLO push su main — MAI trigger PR-da-fork (guard RCE repo pubblico)

permissions:
  contents: read              # least privilege

concurrency:
  group: deploy-jarvis-helix  # serializza i deploy Helix (separato dal gruppo di site-1/lumio)
  cancel-in-progress: true

jobs:
  deploy:
    # defense-in-depth: il job NON gira su fork (solo sul repo canonico)
    if: github.repository == 'toto-castaldi/helix'
    runs-on: [self-hosted, jarvis, helix]
    steps:
      # Pin a commit SHA (NON un tag) — igiene supply-chain (T-10-08).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # VITE_APP_VERSION derivata da git (host/repo-only) — short SHA del commit deployato.
      - name: Derive app version
        id: ver
        run: echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Install lockfile-exact (T-10-SC: npm ci, nessun drift). node 20 sul PATH (drop-in).
      - name: Install dependencies
        run: npm ci

      # --- I TRE build Vite, ciascuno con la sua env di build dai secrets ESISTENTI -----
      # Vite INLINA VITE_* nel bundle: l'anon key è una chiave client PUBBLICA per design
      # (RLS impone l'auth), NON un secret profondo. Solo VITE_SUPABASE_URL + anon key +
      # VITE_APP_VERSION vengono passati (T-10-09: nessun service-role/secret server nel build).
      - name: Build landing (helix.<domain>)
        run: npm run build:landing          # -> dist-landing/
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_APP_VERSION: ${{ steps.ver.outputs.version }}

      - name: Build coach (coach.helix.<domain>)
        run: npm run build                   # -> dist/
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_VERSION: ${{ steps.ver.outputs.version }}

      - name: Build live (live.helix.<domain>)
        run: npm run build:live              # -> dist-live/
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_VERSION: ${{ steps.ver.outputs.version }}

      # --- Deploy ATOMICO per-target: ogni dist nella SUA webroot (T-10-10) --------------
      # Mai rsync --delete in-place su una webroot viva: build una release dir versionata,
      # poi flip ATOMICO del symlink `current` con `mv -T` (rename(2)). Tre target indipendenti.
      - name: Deploy 3 Helix frontends (atomic per-target)
        run: |
          set -euo pipefail
          BASE=/srv/site-1-frontend
          # mapping: <webroot>  <dist-dir>
          deploy_one() {
            local webroot="$1" src="$2"
            local WEBROOT="$BASE/$webroot"
            local DEST="$WEBROOT/releases/$GITHUB_SHA"
            mkdir -p "$DEST"
            # release fresca e completa in una dir versionata
            rsync -a --delete "$src/" "$DEST/"
            # link nuovo ACCANTO a current, poi flip ATOMICO (rename(2))
            ln -sfn "releases/$GITHUB_SHA" "$WEBROOT/.current.tmp"
            mv -T "$WEBROOT/.current.tmp" "$WEBROOT/current"
            # prune: tieni le ultime 5 release (rollback)
            ls -1dt "$WEBROOT"/releases/*/ | tail -n +6 | xargs -r rm -rf
            # log di deploy lato jarvis (l'altra metà dell'osservabilità è il tab Actions)
            printf '%s  %-18s deployed %s\n' "$(date -u +%FT%TZ)" "$webroot" "$GITHUB_SHA" >> "$HOME/deploy.log"
          }
          deploy_one helix-landing-www dist-landing
          deploy_one helix-coach-www   dist
          deploy_one helix-live-www    dist-live
